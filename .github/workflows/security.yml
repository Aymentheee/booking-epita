name: security
on:
  workflow_dispatch

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  dependencies-analysis:
    name: Job 1: Dependencies Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysis Full.sarif
            ./
        continue-on-error: true

      - name: Send report to security dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysis Full.sarif

  source-code-analysis:
    name: Job 2: SourceCodeAnalysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: run analysis with semgrep
        run: semgrep scan --config .semgrep --sarif --output report.sarif

      - name: Send report to security dashboard
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: report.sarif